services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-pr-automation-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 9010
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_pr_automation?schema=public
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:9010}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-AI PR Automation}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-ai-pr-automation@example.com}
      GIT_WORKDIR_ROOT: /tmp/ai-pr-automation
      EXECUTION_PROVIDER: ${EXECUTION_PROVIDER:-bootstrap}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CODEX_MODEL: ${OPENAI_CODEX_MODEL:-gpt-5.2-codex}
      OPENAI_CODEX_REASONING_EFFORT: ${OPENAI_CODEX_REASONING_EFFORT:-medium}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_AI_AGENT_STATUS_NAME: ${JIRA_AI_AGENT_STATUS_NAME:-AI Agent}
    ports:
      - "9010:9010"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ai-pr-automation-db
    environment:
      POSTGRES_DB: ai_pr_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "9011:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_pr_automation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
